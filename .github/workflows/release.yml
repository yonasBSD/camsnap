name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to (re)release (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository }}
  RELEASE_INPUT_TAG: ${{ inputs.tag }}

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Check existing release assets
        id: existing-release
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="$RELEASE_INPUT_TAG"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid release tag: $tag"
            exit 1
          fi
          version="${tag#v}"

          release_json=""
          for attempt in {1..6}; do
            if release_json=$(gh api \
              "repos/${GITHUB_REPOSITORY}/releases/tags/$tag" 2>&1); then
              break
            fi
            if grep -Fq "(HTTP 404)" <<< "$release_json"; then
              echo "complete=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            if [ "$attempt" -eq 6 ]; then
              echo "::error::Could not inspect existing release $tag"
              printf '%s\n' "$release_json" >&2
              exit 1
            fi
            sleep 10
          done

          if ! jq -e '.draft == false and .published_at != null' <<< "$release_json" >/dev/null; then
            echo "::error::Existing release $tag is not published"
            exit 1
          fi

          assets=$(jq -r '
            .assets[]
            | select(.state == "uploaded" and (.size // 0) > 0)
            | .name
          ' <<< "$release_json")

          expected=(
            "camsnap_${version}_darwin_amd64.tar.gz"
            "camsnap_${version}_darwin_arm64.tar.gz"
            "camsnap_${version}_linux_amd64.tar.gz"
            "camsnap_${version}_linux_arm64.tar.gz"
            "camsnap_${version}_windows_amd64.zip"
            "camsnap_${version}_windows_arm64.zip"
            "checksums.txt"
          )
          missing=()
          for asset in "${expected[@]}"; do
            if ! grep -Fxq "$asset" <<< "$assets"; then
              missing+=("$asset")
            fi
          done

          if [ "${#missing[@]}" -ne 0 ]; then
            for asset in "${missing[@]}"; do
              echo "::error::Existing release $tag is missing asset: $asset"
            done
            exit 1
          fi

          echo "complete=true" >> "$GITHUB_OUTPUT"

      - name: Stash GoReleaser config
        run: cp .goreleaser.yaml /tmp/.goreleaser.yaml

      - name: Checkout release tag
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: git checkout "$RELEASE_INPUT_TAG"

      - name: GoReleaser
        if: ${{ steps.existing-release.outputs.complete != 'true' }}
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: latest
          args: release --clean --config /tmp/.goreleaser.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew-tap:
    runs-on: ubuntu-latest
    needs: goreleaser
    steps:
      - name: Resolve release tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [[ ! "$RELEASE_INPUT_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "::error::Invalid release tag: $RELEASE_INPUT_TAG"
              exit 1
            fi
            echo "RELEASE_TAG=$RELEASE_INPUT_TAG" >> "$GITHUB_ENV"
          else
            echo "RELEASE_TAG=${{ github.ref_name }}" >> "$GITHUB_ENV"
          fi

      - name: Dispatch tap formula update
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::Set HOMEBREW_TAP_TOKEN with workflow access to steipete/homebrew-tap"
            exit 1
          fi

          request_id="camsnap-${RELEASE_TAG}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          expected_title="Update camsnap for ${RELEASE_TAG} (${request_id})"

          gh workflow run update-formula.yml \
            --repo steipete/homebrew-tap \
            --ref main \
            -f formula=camsnap \
            -f tag="$RELEASE_TAG" \
            -f repository=steipete/camsnap \
            -f artifact_template="{formula}_{version}_{target}.tar.gz" \
            -f request_id="$request_id"

          run_id=""
          for _ in {1..30}; do
            run_id=$(gh run list \
              --repo steipete/homebrew-tap \
              --workflow update-formula.yml \
              --branch main \
              --event workflow_dispatch \
              --limit 20 \
              --json databaseId,displayTitle \
              --jq ".[] | select(.displayTitle == \"$expected_title\") | .databaseId" | head -n1)
            if [ -n "$run_id" ]; then
              break
            fi
            sleep 5
          done

          if [ -z "$run_id" ]; then
            echo "::error::Could not find tap workflow run with title: $expected_title"
            exit 1
          fi

          api_failures=0
          while true; do
            if ! run_result=$(gh api \
              "repos/steipete/homebrew-tap/actions/runs/$run_id" \
              --jq '.status + "\t" + (.conclusion // "")' 2>&1); then
              api_failures=$((api_failures + 1))
              if [ "$api_failures" -ge 6 ]; then
                echo "::error::Could not read tap workflow run $run_id after $api_failures attempts"
                printf '%s\n' "$run_result" >&2
                exit 1
              fi

              sleep 10
              continue
            fi
            api_failures=0

            case "$run_result" in
              completed$'\t'success)
                exit 0
                ;;
              completed$'\t'*)
                echo "::error::Tap workflow run $run_id finished with: ${run_result#*$'\t'}"
                exit 1
                ;;
            esac

            sleep 10
          done

  docker:
    runs-on: ubuntu-latest
    needs: goreleaser
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Checkout release tag
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          if [[ ! "$RELEASE_INPUT_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid release tag: $RELEASE_INPUT_TAG"
            exit 1
          fi
          git checkout "$RELEASE_INPUT_TAG"

      - name: Resolve Docker tags
        id: docker-tags
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            release_tag="$RELEASE_INPUT_TAG"
          else
            release_tag="${{ github.ref_name }}"
          fi
          version="${release_tag#v}"
          minor="${version%.*}"
          major="${version%%.*}"

          {
            echo "tags<<EOF"
            echo "${IMAGE}:${version}"
            echo "${IMAGE}:${minor}"
            if [ "$major" != "0" ]; then
              echo "${IMAGE}:${major}"
            fi
            echo "${IMAGE}:latest"
            echo "EOF"
            echo "labels<<EOF"
            echo "org.opencontainers.image.source=https://github.com/${GITHUB_REPOSITORY}"
            echo "org.opencontainers.image.version=${version}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.docker-tags.outputs.tags }}
          labels: ${{ steps.docker-tags.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
